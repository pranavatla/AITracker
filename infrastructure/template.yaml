AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AITracker backend — API Gateway + Lambda + DynamoDB

Resources:

  # ── DynamoDB ────────────────────────────────────────────────────────────────
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: aitracker-tasks
      BillingMode: PAY_PER_REQUEST
      DeletionPolicy: Retain
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ── API Gateway ─────────────────────────────────────────────────────────────
  TrackerApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      # No API Gateway-level authorizer — JWT verification is done inside Lambda
      Cors:
        AllowMethods: "'GET,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  # ── Lambda ──────────────────────────────────────────────────────────────────
  ProgressFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: aitracker-progress
      CodeUri: lambda/
      Handler: index.handler
      Runtime: nodejs20.x
      MemorySize: 128
      Timeout: 10
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
          COGNITO_USER_POOL_ID: ap-south-1_60fuD4SDi
          COGNITO_CLIENT_ID: 6f5f8iq0pcpugvc5e9rl1se161
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Events:
        GetProgress:
          Type: Api
          Properties:
            RestApiId: !Ref TrackerApi
            Path: /progress
            Method: GET
        PutProgress:
          Type: Api
          Properties:
            RestApiId: !Ref TrackerApi
            Path: /progress
            Method: PUT
        OptionsProgress:
          Type: Api
          Properties:
            RestApiId: !Ref TrackerApi
            Path: /progress
            Method: OPTIONS

Outputs:
  ApiUrl:
    Description: API base URL (use as VITE_API_BASE_URL)
    Value: !Sub "https://${TrackerApi}.execute-api.ap-south-1.amazonaws.com/prod"
